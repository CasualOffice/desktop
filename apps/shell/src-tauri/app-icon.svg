<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Casual Office">
  <title>Casual Office</title>
  <defs>
    <!-- App tile: soft light squircle so the colored cards read on any wallpaper. -->
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef1f6"/>
    </linearGradient>
    <!-- Document blue (brand docx accent 2563eb). -->
    <linearGradient id="docBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <!-- Spreadsheet green (brand sheets accent 1e7a4f). -->
    <linearGradient id="sheetGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2e9d6a"/>
      <stop offset="1" stop-color="#1e7a4f"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#0b1220" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Rounded app tile -->
  <rect x="72" y="72" width="880" height="880" rx="208" fill="url(#tile)"/>
  <rect x="72.5" y="72.5" width="879" height="879" rx="207.5" fill="none" stroke="#0b1220" stroke-opacity="0.06" stroke-width="2"/>

  <!-- Back card: document (blue) with a folded top-right corner + text lines -->
  <g filter="url(#cardShadow)">
    <path d="M286 250
             h250
             a40 40 0 0 1 28 12
             l92 92
             a40 40 0 0 1 12 28
             v362
             a40 40 0 0 1 -40 40
             h-354
             a40 40 0 0 1 -40 -40
             v-454
             a40 40 0 0 1 40 -40 z"
          fill="url(#docBlue)"/>
    <!-- folded corner -->
    <path d="M536 250 l130 130 h-90 a40 40 0 0 1 -40 -40 z" fill="#1d4ed8"/>
    <!-- text lines -->
    <g fill="#ffffff" opacity="0.92">
      <rect x="330" y="430" width="240" height="26" rx="13"/>
      <rect x="330" y="492" width="300" height="26" rx="13"/>
      <rect x="330" y="554" width="180" height="26" rx="13"/>
    </g>
  </g>

  <!-- Front card: spreadsheet (green) overlapping lower-right, with a grid -->
  <g filter="url(#cardShadow)">
    <rect x="470" y="392" width="372" height="384" rx="40" fill="url(#sheetGreen)"/>
    <!-- header row -->
    <path d="M470 432 a40 40 0 0 1 40 -40 h292 a40 40 0 0 1 40 40 v44 h-372 z" fill="#16623f"/>
    <!-- grid lines -->
    <g stroke="#ffffff" stroke-opacity="0.92" stroke-width="14" stroke-linecap="round">
      <!-- verticals -->
      <line x1="594" y1="500" x2="594" y2="740"/>
      <line x1="718" y1="500" x2="718" y2="740"/>
      <!-- horizontals -->
      <line x1="500" y1="556" x2="812" y2="556"/>
      <line x1="500" y1="624" x2="812" y2="624"/>
      <line x1="500" y1="692" x2="812" y2="692"/>
    </g>
  </g>
</svg>
