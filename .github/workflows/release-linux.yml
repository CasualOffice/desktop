name: Release Linux

# Build .deb + .AppImage on every push of a v* tag and attach them to
# a GitHub Release. Run manually too via workflow_dispatch.
#
# Cross-repo wiring: the editors live in separate gitignored sibling
# directories (`docx/`, `sheets/`). The workflow clones them at the
# `desk_v0.0.0/*` branches the deskApp expects, runs each editor's
# build, copies the dists into `apps/shell/public/`, then builds the
# Tauri shell.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name for the release (e.g. v0.0.1)'
        required: true
        default: 'v0.0.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout deskApp
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "name=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install system dependencies
        # Tauri 2 on Linux needs the WebKitGTK 4.1 dev headers,
        # GTK build deps, librsvg (icon rasterisation) and
        # libappindicator/ayatana (system tray). emf2svg is no
        # longer needed — upstream docx now converts EMF in-browser.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node 22
        # Node 22 is REQUIRED: the vendored Univer fork's engine-render
        # `prepare` hook runs `node --experimental-strip-types`, which Node 20
        # rejects (the release would die in setup-fork.sh on Node 20).
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack (pnpm per each package's packageManager)
        # corepack resolves the exact pnpm version from each repo's
        # `packageManager` field — deskApp uses pnpm@9.x, sheets + the Univer
        # fork use pnpm@10.x. pnpm/action-setup would pin one global version
        # and mismatch the sheets lockfile under --frozen-lockfile.
        run: corepack enable

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install tauri-cli
        # `cargo tauri build` requires the CLI binary on PATH. We
        # don't pin a workspace tauri-cli, so install it once
        # against the same major version as the runtime crate.
        run: cargo install tauri-cli --version "^2" --locked

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/shell/src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('apps/shell/src-tauri/Cargo.lock') }}

      - name: Clone docx editor (main, with design-system submodule)
        run: |
          # The desktop bridge + offline-first flag now live in main (the old
          # desk_v0.0.0/bridge-wiring branch was folded in), so build from main.
          # docx-editor/styles.css @imports the @schnsrw/design-system tokens
          # vendored at docx-editor/vendor/design-system (a git submodule whose
          # .gitmodules URL is SSH) — the CSS build fails with a missing
          # dist/tokens.css without it. Rewrite SSH->HTTPS so the public
          # submodule clones without a deploy key, then init it shallowly.
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git clone --depth 1 --branch main \
            https://github.com/CasualOffice/docs.git docx
          git -C docx submodule update --init --recursive --depth 1 \
            docx-editor/vendor/design-system
          (cd docx/docx-editor && bun install)

      - name: Clone sheets editor (main, with Univer fork submodules)
        run: |
          # Build from main now — desk_v0.0.0/no-cdn-fonts is superseded. main
          # resolves @univerjs/* to the vendored Univer fork via pnpm overrides,
          # so the submodules must be present and the fork built (setup-fork.sh)
          # before install. .gitmodules uses SSH URLs; rewrite to HTTPS so the
          # public fork repos clone without a deploy key.
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git clone --depth 1 --recurse-submodules --shallow-submodules --branch main \
            https://github.com/CasualOffice/sheets.git sheets
          cd sheets
          # Build + swap the Univer fork package.jsons to lib/ (matches sheets CI).
          ./scripts/setup-fork.sh
          # --no-frozen-lockfile: pnpm v9 forces frozen under CI=true; tolerate
          # small lockfile drift so a release isn't gated on it.
          pnpm install --no-frozen-lockfile
          # apps/web imports the SDK's built dist — build it before the app.
          pnpm --filter @casualoffice/sheets build

      - name: Build docx editor
        working-directory: docx/docx-editor/examples/vite
        run: bun run build

      - name: Build sheets editor
        working-directory: sheets/apps/web
        env:
          # Univer's bundle is large; raise Node's old-space ceiling so the
          # `vite build` doesn't OOM on memory-constrained runners.
          NODE_OPTIONS: --max-old-space-size=4096
        # --base=./ so the bundled /assets paths resolve under the /sheets/ mount
        # in the Tauri shell. main's `build` script omits --base by design (the
        # web deploy needs an absolute base for SPA sub-routes), so pass it here.
        # The "Verify editor asset paths are relative" step below guards this.
        run: pnpm exec vite build --base=./

      - name: Install shell deps
        # Same reason as the sheets install: keep CI tolerant of small
        # lockfile drifts so a single dependency edit doesn't gate a
        # release. Plain `pnpm install` still picks up CI=true and
        # forces frozen mode, hence the explicit flag.
        run: pnpm install --no-frozen-lockfile

      - name: Copy editor dists into shell
        working-directory: apps/shell
        run: ./scripts/copy-editors.sh

      - name: Verify editor asset paths are relative
        # Guard against the #1 desktop-bundle failure: an editor built
        # without a relative base ships index.html referencing /assets/…
        # at the app root, which 404s under /docx/ or /sheets/ and leaves
        # a blank editor window. Fail the release here, loudly, instead of
        # shipping a broken build.
        run: |
          fail=0
          for ed in docx sheets; do
            if grep -Eq '(src|href)="/(assets|favicon)' "apps/shell/public/$ed/index.html"; then
              echo "ERROR: $ed editor has absolute asset paths (build with --base=./ / PAGES_BASE=./)" >&2
              grep -E '(src|href)="/(assets|favicon)' "apps/shell/public/$ed/index.html" >&2
              fail=1
            fi
          done
          if [ -f apps/shell/public/logo.svg ]; then echo "root logo.svg present"; else echo "WARN: root logo.svg missing"; fi
          [ "$fail" = "0" ] && echo "OK: docx + sheets bundles use relative asset paths."
          exit $fail

      - name: Build shell (vite)
        working-directory: apps/shell
        run: pnpm build

      - name: Build Tauri bundles
        working-directory: apps/shell/src-tauri
        env:
          # createUpdaterArtifacts signs the AppImage updater artifact.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: cargo tauri build --bundles deb,appimage

      - name: Stage artifacts + update manifest
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.name }}"; VER="${TAG#v}"
          BASE="apps/shell/src-tauri/target/release/bundle"
          mkdir -p release-artifacts
          cp "$BASE/deb/"*.deb release-artifacts/
          cp "$BASE/appimage/"*.AppImage release-artifacts/
          # Updater artifact = the AppImage; createUpdaterArtifacts wrote its .sig.
          APPIMAGE=$(ls "$BASE/appimage/"*.AppImage | head -1)
          NAME=$(basename "$APPIMAGE")
          SIG=$(cat "$BASE/appimage/"*.AppImage.sig)
          # GitHub's release-asset API rewrites spaces in filenames to '.', so the
          # served asset name differs from the local basename (productName
          # "Casual Office" contains a space). Match it or the updater 404s.
          ASSET="${NAME// /.}"
          URL="https://github.com/CasualOffice/desktop/releases/download/$TAG/$ASSET"
          PUB=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          jq -n --arg v "$VER" --arg p "$PUB" --arg sig "$SIG" --arg url "$URL" \
            '{version:$v, pub_date:$p, platforms: {"linux-x86_64": {signature:$sig, url:$url}}}' \
            > "release-artifacts/linux-x86_64.json"
          ls -lh release-artifacts/

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          draft: false
          # Mark pre-releases (any tag with a hyphen, e.g. v0.0.2-rc1) so the
          # `releases/latest/download/` alias the updater queries skips them and
          # production installs aren't pushed an unvalidated build.
          prerelease: ${{ contains(steps.tag.outputs.name, '-') }}
          generate_release_notes: true
          files: |
            release-artifacts/*.deb
            release-artifacts/*.AppImage
            release-artifacts/linux-x86_64.json
          body: |
            Casual Office ${{ steps.tag.outputs.name }} — Linux build.

            ## Install (.deb, Debian / Ubuntu)
            ```sh
            sudo dpkg -i "Casual Office_*_amd64.deb"
            ```

            ## Run (.AppImage)
            ```sh
            chmod +x Casual\ Office_*_amd64.AppImage
            ./Casual\ Office_*_amd64.AppImage
            ```

            Files stay on disk — Casual Office is single-user and
            local-only. No sync, no account, no telemetry.
