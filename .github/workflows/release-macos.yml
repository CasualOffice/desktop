name: Release macOS

# Build a universal (arm64 + x86_64) .app + .dmg on every push of a v*
# tag and attach them to the same GitHub Release that release-linux.yml
# and release-windows.yml write to. softprops/action-gh-release updates
# the existing release with additional files rather than overwriting it.
#
# Cross-repo wiring differs from the linux/windows workflows: the sheets
# editor now builds from `main`, where every @univerjs/* package resolves
# to the vendored Univer fork at sheets/vendor/univer-revamp (a git
# submodule). So both editors are cloned WITH submodules, and sheets runs
# ./scripts/setup-fork.sh (build the fork + swap package.jsons) before its
# own build. The editor submodules use git@ SSH URLs; since the repos are
# public, we rewrite SSH→HTTPS so no deploy key is needed.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name for the release (e.g. v0.0.1)'
        required: true
        default: 'v0.0.0'

permissions:
  contents: write

jobs:
  build:
    # macos-14 is arm64; we add the x86_64 rust target and build a
    # universal binary so one .dmg runs on both Apple Silicon and Intel.
    runs-on: macos-14
    steps:
      - name: Checkout deskApp
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "name=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Rewrite submodule SSH URLs to HTTPS
        # The editor repos pin their submodules (univer-revamp,
        # design-system, collab) with git@github.com: URLs. Those need an
        # SSH key. The repos are public, so rewrite to HTTPS globally and
        # `git submodule update` resolves over anonymous HTTPS instead.
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Setup Node 22
        # Node 22 is REQUIRED: the vendored Univer fork's engine-render
        # `prepare` hook runs `node --experimental-strip-types`, which Node 20
        # rejects during sheets/setup-fork.sh.
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack (pnpm per each package's packageManager)
        # corepack resolves the exact pnpm version from each repo's
        # `packageManager` field — deskApp uses pnpm@9.x, sheets + the Univer
        # fork use pnpm@10.x.
        run: corepack enable

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust (universal apple targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2" --locked

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/shell/src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('apps/shell/src-tauri/Cargo.lock') }}

      - name: Clone docx editor (main, with submodules)
        # docx-editor/styles.css @imports the @schnsrw/design-system tokens
        # vendored at docx-editor/vendor/design-system (a submodule) — the
        # build fails without it checked out.
        run: |
          git clone --branch main \
            https://github.com/CasualOffice/docs.git docx
          git -C docx submodule update --init --recursive docx-editor/vendor/design-system
          (cd docx/docx-editor && bun install)

      - name: Clone sheets editor (main, with submodules)
        # On main every @univerjs/* resolves to the vendored fork at
        # vendor/univer-revamp (submodule). setup-fork.sh builds the fork
        # and swaps its package.jsons to the consumable lib/ shape before
        # the workspace install can link them.
        run: |
          git clone --branch main \
            https://github.com/CasualOffice/sheets.git sheets
          git -C sheets submodule update --init --recursive vendor/univer-revamp vendor/design-system
          (cd sheets && ./scripts/setup-fork.sh)
          (cd sheets && pnpm install --no-frozen-lockfile)

      - name: Build docx editor
        working-directory: docx/docx-editor/examples/vite
        run: bun run build

      - name: Build sheets SDK (packages/sdk dist)
        # apps/web imports `@casualoffice/sheets/xlsx` whose types resolve
        # through packages/sdk/dist/. Build it before the web app.
        working-directory: sheets
        run: pnpm --filter @casualoffice/sheets build

      - name: Build sheets editor
        working-directory: sheets/apps/web
        # --base=./ so the bundled /assets paths resolve under the /sheets/ mount
        # in the Tauri shell. main's `build` script omits --base by design (the
        # web deploy needs an absolute base for SPA sub-routes), so pass it here.
        # The "Verify editor asset paths are relative" step below guards this.
        run: pnpm exec vite build --base=./

      - name: Install shell deps
        run: pnpm install --no-frozen-lockfile

      - name: Copy editor dists into shell
        working-directory: apps/shell
        run: ./scripts/copy-editors.sh

      - name: Verify editor asset paths are relative
        # Fail the release if an editor shipped absolute /assets/ paths
        # (built without a relative base) — that produces a blank editor
        # window under /docx/ or /sheets/.
        run: |
          fail=0
          for ed in docx sheets; do
            if grep -Eq '(src|href)="/(assets|favicon)' "apps/shell/public/$ed/index.html"; then
              echo "ERROR: $ed editor has absolute asset paths (build with --base=./ / PAGES_BASE=./)" >&2
              grep -E '(src|href)="/(assets|favicon)' "apps/shell/public/$ed/index.html" >&2
              fail=1
            fi
          done
          [ "$fail" = "0" ] && echo "OK: docx + sheets bundles use relative asset paths."
          exit $fail

      - name: Build shell (vite)
        working-directory: apps/shell
        run: pnpm build

      - name: Build Tauri bundles (universal .app + .dmg)
        working-directory: apps/shell/src-tauri
        run: cargo tauri build --target universal-apple-darwin --bundles app,dmg

      - name: Stage artifacts
        run: |
          mkdir -p release-artifacts
          cp "apps/shell/src-tauri/target/universal-apple-darwin/release/bundle/dmg/"*.dmg \
             release-artifacts/
          ls -lh release-artifacts/

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-artifacts/*.dmg
          body: |
            Casual Office ${{ steps.tag.outputs.name }} — macOS build (universal).

            ## Install (.dmg)
            Open the .dmg and drag **Casual Office** into Applications.

            The build is unsigned. On first launch, right-click the app →
            **Open**, or run:
            ```sh
            xattr -dr com.apple.quarantine "/Applications/Casual Office.app"
            ```

            Files stay on disk — Casual Office is single-user and
            local-only. No sync, no account, no telemetry.
