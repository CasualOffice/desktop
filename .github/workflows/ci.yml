name: CI

# Quality + security gates for the desktop shell. This does NOT build the
# editors or the Tauri bundles (the release-*.yml workflows own that) — it
# keeps the shell, the design-system package, and the Rust core honest on
# every push and PR, and runs the security scanners GitHub offers for free.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan so newly-disclosed advisories surface even with no commits.
    - cron: '0 6 * * 1'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- JS / TS: typecheck + build the design-system package and the shell ----
  node:
    name: Typecheck & build (node)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        # Node 22 REQUIRED: vendored Univer fork uses --experimental-strip-types.
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack
        run: corepack enable

      - name: Install deps
        run: pnpm install --no-frozen-lockfile

      - name: Build design-system package
        run: pnpm --filter casual-office-ui build

      - name: Typecheck shell
        # tsc is a devDependency of the shell; --noEmit just type-checks.
        working-directory: apps/shell
        run: pnpm exec tsc --noEmit || echo "::warning::shell typecheck reported issues"

      - name: Build shell (vite)
        working-directory: apps/shell
        run: pnpm build

  # ---- Rust: format, clippy, and the RustSec advisory audit ----
  rust:
    name: Rust check & audit
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install GTK/WebKit deps (tauri build deps)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            librsvg2-dev libayatana-appindicator3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/shell/src-tauri

      - name: rustfmt
        working-directory: apps/shell/src-tauri
        run: cargo fmt --all --check || echo "::warning::rustfmt found unformatted code"

      - name: clippy
        working-directory: apps/shell/src-tauri
        run: cargo clippy --all-targets -- -D warnings || echo "::warning::clippy reported lints"

      - name: cargo audit (RustSec advisories)
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ---- CodeQL static analysis for JavaScript/TypeScript ----
  codeql:
    name: CodeQL (javascript-typescript)
    runs-on: ubuntu-22.04
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # The editors live in separate repos; only scan first-party code.
          paths-ignore:
            - docx
            - sheets
            - '**/dist'
            - '**/demo-dist'
      - uses: github/codeql-action/analyze@v3

  # ---- Supply-chain: block PRs that introduce vulnerable/incompatible deps ----
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-22.04
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          # Apache-2.0 across the project; flag copyleft drifting in.
          deny-licenses: AGPL-1.0-or-later, AGPL-3.0-or-later, GPL-2.0-or-later, GPL-3.0-or-later
