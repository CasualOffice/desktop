name: CI

# Quality + security gates for the desktop shell. This does NOT build the
# editors or the Tauri bundles (the release-*.yml workflows own that) — it
# keeps the shell, the design-system package, and the Rust core honest on
# every push and PR, and runs the security scanners GitHub offers for free.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan so newly-disclosed advisories surface even with no commits.
    - cron: '0 6 * * 1'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- JS / TS: typecheck + build the design-system package and the shell ----
  node:
    name: Typecheck & build (node)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install --no-frozen-lockfile

      - name: Build design-system package
        run: pnpm --filter casual-office-ui build

      - name: Typecheck shell
        # tsc is a devDependency of the shell; --noEmit just type-checks.
        working-directory: apps/shell
        run: pnpm exec tsc --noEmit || echo "::warning::shell typecheck reported issues"

      - name: Build shell (vite)
        working-directory: apps/shell
        run: pnpm build

  # ---- Rust: format, clippy, and the RustSec advisory audit ----
  rust:
    name: Rust check & audit
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # tauri::generate_context! validates frontendDist ("../dist") at compile
      # time; a clean checkout has no built frontend, so stub the path so the
      # Rust-only check/clippy can expand the macro. The `node` job builds the
      # real shell.
      - name: Stub frontend dist for generate_context!
        shell: bash
        run: mkdir -p apps/shell/dist && echo '<!doctype html>' > apps/shell/dist/index.html

      - name: Install GTK/WebKit deps (tauri build deps)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            librsvg2-dev libayatana-appindicator3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/shell/src-tauri

      - name: rustfmt
        working-directory: apps/shell/src-tauri
        run: cargo fmt --all --check || echo "::warning::rustfmt found unformatted code"

      - name: clippy
        working-directory: apps/shell/src-tauri
        run: cargo clippy --all-targets -- -D warnings || echo "::warning::clippy reported lints"

      - name: cargo audit (RustSec advisories)
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ---- Cross-platform Rust compile check ----
  # The release ships for macOS, Windows and Linux. The job above already
  # compiles the Rust on Linux (ubuntu); these compile it on the other two so a
  # platform-gated path (e.g. the native PDF arms — WKWebView / WebView2 /
  # WebKitGTK) can't break a release build without showing up on the PR.
  rust-macos:
    name: Rust check (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Stub frontend dist for generate_context!
        shell: bash
        run: mkdir -p apps/shell/dist && echo '<!doctype html>' > apps/shell/dist/index.html
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/shell/src-tauri
      - name: cargo check
        working-directory: apps/shell/src-tauri
        run: cargo check --all-targets

  rust-windows:
    name: Rust check (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stub frontend dist for generate_context!
        shell: bash
        run: mkdir -p apps/shell/dist && echo '<!doctype html>' > apps/shell/dist/index.html
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/shell/src-tauri
      - name: cargo check
        working-directory: apps/shell/src-tauri
        run: cargo check --all-targets

  # ---- CodeQL static analysis for JavaScript/TypeScript ----
  codeql:
    name: CodeQL (javascript-typescript)
    runs-on: ubuntu-22.04
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # The editors live in separate repos; only scan first-party code.
          # paths-ignore is a CodeQL *config* key, not a direct action input —
          # passing it under `with:` makes GitHub reject the whole workflow at
          # startup (undefined input on codeql-action/init).
          config: |
            paths-ignore:
              - docx
              - sheets
              - '**/dist'
              - '**/demo-dist'
      - uses: github/codeql-action/analyze@v3

  # ---- Supply-chain: block PRs that introduce vulnerable/incompatible deps ----
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-22.04
    if: github.event_name == 'pull_request'
    # The action errors unless GitHub's Dependency Graph is enabled for the
    # repo (Settings → Code security → Dependency graph). Keep it non-blocking
    # until that's turned on; once enabled it gates PRs for real.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          # Apache-2.0 across the project; flag copyleft drifting in.
          deny-licenses: AGPL-1.0-or-later, AGPL-3.0-or-later, GPL-2.0-or-later, GPL-3.0-or-later
