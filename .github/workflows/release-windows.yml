name: Release Windows

# Build .msi (WiX) + .exe (NSIS) on every push of a v* tag and attach
# them to the same GitHub Release that release-linux.yml writes to.
# Both workflows target the same tag name; softprops/action-gh-release
# updates the existing release with additional files rather than
# overwriting it.
#
# Cross-repo wiring matches the Linux workflow: clone the editors at
# the desk_v0.0.0/* branches, build each, copy dists into
# apps/shell/public/, then build the Tauri shell.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name for the release (e.g. v0.0.1)'
        required: true
        default: 'v0.0.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        # Bash on Windows runs via Git Bash. Pin it so the editor
        # build scripts (copy-editors.sh) and pnpm install behave the
        # same way they do on Linux.
        shell: bash
    steps:
      - name: Checkout deskApp
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "name=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node 22
        # Node 22 is REQUIRED: the vendored Univer fork's engine-render
        # `prepare` hook runs `node --experimental-strip-types`, which Node 20
        # rejects during sheets/setup-fork.sh.
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack (pnpm per each package's packageManager)
        # corepack resolves the exact pnpm version from each repo's
        # `packageManager` field — deskApp uses pnpm@9.x, sheets + the Univer
        # fork use pnpm@10.x.
        run: corepack enable

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust (msvc target)
        # windows-latest already ships with the MSVC build chain.
        # Tauri produces .msi via WiX and .exe via NSIS, both of
        # which require the msvc toolchain.
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2" --locked

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/shell/src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('apps/shell/src-tauri/Cargo.lock') }}

      - name: Clone docx editor (main)
        run: |
          # The desktop bridge + offline-first flag now live in main (the old
          # desk_v0.0.0/bridge-wiring branch was folded in), so build from main.
          git clone --depth 1 --branch main \
            https://github.com/CasualOffice/docs.git docx
          (cd docx/docx-editor && bun install)

      - name: Clone sheets editor (main, with Univer fork submodules)
        run: |
          # Build from main now — desk_v0.0.0/no-cdn-fonts is superseded. main
          # resolves @univerjs/* to the vendored Univer fork via pnpm overrides,
          # so the submodules must be present and the fork built (setup-fork.sh)
          # before install. .gitmodules uses SSH URLs; rewrite to HTTPS so the
          # public fork repos clone without a deploy key.
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git clone --depth 1 --recurse-submodules --shallow-submodules --branch main \
            https://github.com/CasualOffice/sheets.git sheets
          cd sheets
          # Build + swap the Univer fork package.jsons to lib/ (matches sheets CI).
          ./scripts/setup-fork.sh
          # --no-frozen-lockfile: pnpm v9 forces frozen under CI=true; tolerate
          # small lockfile drift so a release isn't gated on it.
          pnpm install --no-frozen-lockfile
          # apps/web imports the SDK's built dist — build it before the app.
          pnpm --filter @casualoffice/sheets build

      - name: Build docx editor
        working-directory: docx/docx-editor/examples/vite
        run: bun run build

      - name: Build sheets editor
        working-directory: sheets/apps/web
        # --base=./ so the bundled /assets paths resolve under the /sheets/ mount
        # in the Tauri shell. main's `build` script omits --base by design (the
        # web deploy needs an absolute base for SPA sub-routes), so pass it here.
        # The "Verify editor asset paths are relative" step below guards this.
        run: pnpm exec vite build --base=./

      - name: Install shell deps
        run: pnpm install --no-frozen-lockfile

      - name: Copy editor dists into shell
        working-directory: apps/shell
        run: ./scripts/copy-editors.sh

      - name: Verify editor asset paths are relative
        # Fail the release if an editor shipped absolute /assets/ paths
        # (built without a relative base) — that produces a blank editor
        # window under /docx/ or /sheets/.
        run: |
          fail=0
          for ed in docx sheets; do
            if grep -Eq '(src|href)="/(assets|favicon)' "apps/shell/public/$ed/index.html"; then
              echo "ERROR: $ed editor has absolute asset paths (build with --base=./ / PAGES_BASE=./)" >&2
              grep -E '(src|href)="/(assets|favicon)' "apps/shell/public/$ed/index.html" >&2
              fail=1
            fi
          done
          [ "$fail" = "0" ] && echo "OK: docx + sheets bundles use relative asset paths."
          exit $fail

      - name: Build shell (vite)
        working-directory: apps/shell
        run: pnpm build

      - name: Build Tauri bundles
        working-directory: apps/shell/src-tauri
        # `msi` = WiX-based installer; `nsis` = NSIS-based .exe
        # installer with embedded WebView2 bootstrapper. Both are
        # produced from the same target/release/deskapp-shell.exe.
        env:
          # createUpdaterArtifacts signs the NSIS -setup.exe updater artifact.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: cargo tauri build --bundles msi,nsis

      - name: Stage artifacts + update manifest
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.name }}"; VER="${TAG#v}"
          BASE="apps/shell/src-tauri/target/release/bundle"
          mkdir -p release-artifacts
          cp "$BASE/msi/"*.msi release-artifacts/ 2>/dev/null || true
          cp "$BASE/nsis/"*.exe release-artifacts/ 2>/dev/null || true
          # Updater artifact = the NSIS -setup.exe; createUpdaterArtifacts wrote its .sig.
          EXE=$(ls "$BASE/nsis/"*-setup.exe | head -1)
          NAME=$(basename "$EXE")
          SIG=$(cat "$BASE/nsis/"*-setup.exe.sig)
          URL="https://github.com/CasualOffice/desktop/releases/download/$TAG/$NAME"
          PUB=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          jq -n --arg v "$VER" --arg p "$PUB" --arg sig "$SIG" --arg url "$URL" \
            '{version:$v, pub_date:$p, platforms: {"windows-x86_64": {signature:$sig, url:$url}}}' \
            > "release-artifacts/windows-x86_64.json"
          ls -lh release-artifacts/

      - name: Attach to GitHub Release
        # Same tag as release-linux.yml — softprops updates the
        # existing release with additional files rather than
        # overwriting it.
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          draft: false
          prerelease: false
          # Don't regenerate notes here — release-linux.yml does
          # that and we'd otherwise overwrite the merged notes.
          generate_release_notes: false
          files: |
            release-artifacts/*.msi
            release-artifacts/*.exe
            release-artifacts/windows-x86_64.json
